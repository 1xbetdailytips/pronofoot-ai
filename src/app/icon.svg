<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="p" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e3858"/>
      <stop offset="100%" stop-color="#08213e"/>
    </linearGradient>
    <radialGradient id="b" cx="38%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#164262"/>
      <stop offset="100%" stop-color="#0a2038"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#e5f3fc" stroke="#1eaae8" stroke-width="1.2"/>
  <!-- Crosshair lines -->
  <line x1="16" y1="3" x2="16" y2="7" stroke="#1eaae8" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
  <line x1="16" y1="25" x2="16" y2="29" stroke="#1eaae8" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
  <line x1="3" y1="16" x2="7" y2="16" stroke="#1eaae8" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="29" y2="16" stroke="#1eaae8" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
  <!-- Crosshair ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#1eaae8" stroke-width="0.8" opacity="0.2"/>
  <!-- Center pillar -->
  <rect x="13" y="14" width="6" height="10" rx="3" fill="url(#p)" stroke="#1eaae8" stroke-width="0.6"/>
  <!-- Soccer ball -->
  <circle cx="16" cy="12" r="5" fill="url(#b)" stroke="#1eaae8" stroke-width="0.6"/>
  <polygon points="16,8.5 18,10 17.2,12.2 14.8,12.2 14,10" fill="none" stroke="#b8dff0" stroke-width="0.6" opacity="0.5"/>
  <!-- Left mini pillar -->
  <rect x="6" y="16" width="4.5" height="8" rx="2.25" fill="url(#p)" stroke="#1eaae8" stroke-width="0.5" opacity="0.9"/>
  <circle cx="8.25" cy="14.5" r="3.2" fill="url(#b)" stroke="#1eaae8" stroke-width="0.5" opacity="0.9"/>
  <!-- Right mini pillar -->
  <rect x="21.5" y="16" width="4.5" height="8" rx="2.25" fill="url(#p)" stroke="#1eaae8" stroke-width="0.5" opacity="0.9"/>
  <circle cx="23.75" cy="14.5" r="3.2" fill="url(#b)" stroke="#1eaae8" stroke-width="0.5" opacity="0.9"/>
</svg>