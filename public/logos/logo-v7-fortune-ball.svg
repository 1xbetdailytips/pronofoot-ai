<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- V7: Fortune Ball — Crystal ball that's also a football. The fortune teller concept. -->
  <!-- Concept: A crystal ball / magic 8-ball that happens to be a football. Predictions = fortune telling. -->

  <!-- Stand / base (elegant curved base like a crystal ball holder) -->
  <path d="M145 305 C145 295 170 288 200 288 C230 288 255 295 255 305 L258 315 C258 320 235 328 200 328 C165 328 142 320 142 315 Z"
        fill="#065f46"/>
  <ellipse cx="200" cy="315" rx="58" ry="10" fill="#047857"/>

  <!-- The ball — gradient from deep green to emerald (glass-like) -->
  <defs>
    <radialGradient id="glass" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="185" r="115" fill="url(#glass)" stroke="#047857" stroke-width="3"/>

  <!-- Glass reflection (top-left highlight, makes it look 3D/shiny) -->
  <ellipse cx="168" cy="135" rx="45" ry="30" transform="rotate(-25 168 135)" fill="white" opacity="0.12"/>
  <ellipse cx="158" cy="125" rx="20" ry="12" transform="rotate(-25 158 125)" fill="white" opacity="0.08"/>

  <!-- Football pentagon pattern (ghostly, like it's inside the crystal ball) -->
  <path d="M200 130 L225 148 L218 178 L182 178 L175 148 Z"
        fill="none" stroke="white" stroke-width="1.8" opacity="0.2"/>
  <!-- Surrounding hex shapes -->
  <path d="M225 148 L252 142 L260 168 L240 182 L218 178 Z" fill="none" stroke="white" stroke-width="1.2" opacity="0.12"/>
  <path d="M175 148 L148 142 L140 168 L160 182 L182 178 Z" fill="none" stroke="white" stroke-width="1.2" opacity="0.12"/>
  <path d="M200 130 L225 148 M200 130 L175 148" fill="none" stroke="white" stroke-width="1.2" opacity="0.12"/>
  <path d="M182 178 L175 208 M218 178 L225 208" fill="none" stroke="white" stroke-width="1.2" opacity="0.1"/>

  <!-- "Prediction" text floating inside the ball (like a magic 8-ball answer) -->
  <text x="200" y="230" text-anchor="middle" font-family="'Georgia', serif" font-style="italic" font-size="16" fill="#34d399" opacity="0.6">1 - 0</text>

  <!-- Sparkle/star accents (mystical feel) -->
  <!-- Star 1 -->
  <path d="M285 110 L287 116 L293 118 L287 120 L285 126 L283 120 L277 118 L283 116 Z" fill="#34d399" opacity="0.5"/>
  <!-- Star 2 -->
  <path d="M130 100 L131 104 L135 105 L131 106 L130 110 L129 106 L125 105 L129 104 Z" fill="#34d399" opacity="0.4"/>
  <!-- Star 3 -->
  <path d="M310 175 L311 178 L314 179 L311 180 L310 183 L309 180 L306 179 L309 178 Z" fill="#10b981" opacity="0.35"/>
  <!-- Tiny dots (stardust) -->
  <circle cx="120" cy="160" r="1.5" fill="#34d399" opacity="0.3"/>
  <circle cx="295" cy="145" r="1.5" fill="#34d399" opacity="0.3"/>
  <circle cx="275" cy="230" r="1.5" fill="#34d399" opacity="0.25"/>
  <circle cx="140" cy="240" r="1" fill="#34d399" opacity="0.2"/>

  <!-- Wordmark -->
  <text x="200" y="368" text-anchor="middle" font-family="'Georgia', serif" font-size="32" fill="#065f46" font-weight="700" letter-spacing="1">
    prono<tspan fill="#059669" font-weight="800">foot</tspan>
  </text>
  <text x="200" y="392" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#10b981" letter-spacing="6" opacity="0.6">PREDICTIONS</text>
</svg>
