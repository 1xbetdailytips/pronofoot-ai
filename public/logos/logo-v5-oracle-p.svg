<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- V5: The Oracle P — Letter P where the bowl is a football, stem has a pulse line -->
  <!-- Concept: The P "sees" the future. Football IS the mind of the letter. -->

  <!-- The P stem — slightly tapered, hand-drawn feel with subtle curve -->
  <path d="M120 95 C118 95 116 97 116 100 L116 320 C116 326 120 330 124 330 L134 330 C138 330 142 326 142 320 L142 228"
        fill="#059669" stroke="none"/>

  <!-- Pulse/heartbeat line running down the stem (the AI's pulse) -->
  <path d="M129 245 L129 260 L122 268 L136 280 L129 288 L129 325"
        fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- The P bowl — shaped like a football (slightly oval, tilted) -->
  <ellipse cx="210" cy="162" rx="88" ry="72" transform="rotate(-8 210 162)" fill="#059669"/>

  <!-- Football seam lines (hand-drawn style — slightly imperfect) -->
  <!-- Vertical seam -->
  <path d="M210 94 C212 110 208 140 210 162 C212 184 208 210 210 230"
        fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.35"/>
  <!-- Horizontal seam -->
  <path d="M135 155 C155 148 180 152 210 162 C240 172 265 168 285 160"
        fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.35"/>
  <!-- Cross stitches on vertical seam -->
  <path d="M200 120 L220 116 M198 138 L222 134 M198 158 L222 154 M200 178 L220 174 M202 196 L218 193"
        fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.25"/>

  <!-- Small "AI eye" — a subtle dot in the center of the football, like it's watching -->
  <circle cx="210" cy="160" r="6" fill="white" opacity="0.5"/>
  <circle cx="210" cy="160" r="3" fill="#065f46"/>

  <!-- Connection from stem to bowl (the neck of the P) -->
  <path d="M142 100 C142 98 145 95 150 95 L175 95 C175 95 142 95 142 100 Z" fill="#059669"/>
  <path d="M142 228 C142 230 145 232 150 232 L170 232" fill="#059669"/>
  <rect x="142" y="95" width="30" height="137" fill="#059669"/>

  <!-- Wordmark -->
  <text x="114" y="380" font-family="'Georgia', 'Times New Roman', serif" font-weight="700" font-size="38" fill="#065f46" letter-spacing="1.5">
    <tspan>prono</tspan><tspan fill="#059669" font-weight="800">foot</tspan>
  </text>
  <text x="342" y="372" font-family="'SF Mono', 'Fira Code', monospace" font-weight="600" font-size="14" fill="#10b981" opacity="0.7">ai</text>
</svg>
