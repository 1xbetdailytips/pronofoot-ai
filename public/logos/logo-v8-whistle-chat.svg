<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- V8: The Whistle Chat — A referee whistle that doubles as a speech bubble -->
  <!-- Concept: The AI "calls it" like a referee. The whistle speaks predictions. -->

  <!-- Speech bubble / whistle body (organic rounded shape) -->
  <path d="M100 120 C100 85 130 60 175 60 L280 60 C325 60 350 85 350 120 L350 195 C350 230 325 255 280 255 L220 255 L180 295 L190 255 L175 255 C130 255 100 230 100 195 Z"
        fill="#059669"/>

  <!-- Inner shadow for depth -->
  <path d="M115 125 C115 95 140 75 178 75 L277 75 C315 75 335 95 335 125 L335 190 C335 220 315 240 277 240 L215 240 L182 272 L190 240 L178 240 C140 240 115 220 115 190 Z"
        fill="none" stroke="white" stroke-width="1" opacity="0.1"/>

  <!-- Whistle details — mouthpiece on the left -->
  <rect x="68" y="145" width="38" height="28" rx="8" fill="#047857"/>
  <rect x="55" y="150" width="20" height="18" rx="6" fill="#065f46"/>
  <!-- Whistle ring hole -->
  <circle cx="65" cy="140" r="8" fill="none" stroke="#047857" stroke-width="3"/>

  <!-- Lanyard/string going up -->
  <path d="M65 132 C65 110 80 95 95 80" fill="none" stroke="#047857" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Inside the bubble: The prediction content -->
  <!-- Score display — like the AI is "saying" the score -->
  <text x="225" y="140" text-anchor="middle" font-family="'SF Mono', 'Courier New', monospace" font-weight="900" font-size="52" fill="white" opacity="0.9">
    2-1
  </text>

  <!-- Confidence bar under the score -->
  <rect x="160" y="160" width="130" height="8" rx="4" fill="white" opacity="0.15"/>
  <rect x="160" y="160" width="98" height="8" rx="4" fill="#34d399" opacity="0.6"/>
  <!-- 75% label -->
  <text x="265" y="169" font-family="'SF Mono', monospace" font-size="10" fill="white" opacity="0.5">75%</text>

  <!-- Small prediction chips inside bubble -->
  <rect x="155" y="185" width="32" height="18" rx="9" fill="white" opacity="0.15"/>
  <text x="171" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="white" opacity="0.7">1X2</text>

  <rect x="195" y="185" width="42" height="18" rx="9" fill="white" opacity="0.15"/>
  <text x="216" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="white" opacity="0.7">O2.5</text>

  <rect x="245" y="185" width="42" height="18" rx="9" fill="white" opacity="0.15"/>
  <text x="266" y="198" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="10" fill="white" opacity="0.7">BTTS</text>

  <!-- Sound waves coming from whistle (the AI speaking) -->
  <path d="M355 140 C362 135 362 175 355 170" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M365 132 C375 125 375 185 365 178" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <path d="M375 125 C388 115 388 195 375 185" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>

  <!-- Wordmark -->
  <text x="200" y="348" text-anchor="middle" font-family="'Georgia', serif" font-size="34" font-weight="700" letter-spacing="1">
    <tspan fill="#065f46">prono</tspan><tspan fill="#059669">foot</tspan>
  </text>
  <!-- AI badge — small pill -->
  <rect x="180" y="360" width="40" height="20" rx="10" fill="#059669"/>
  <text x="200" y="375" text-anchor="middle" font-family="'SF Mono', monospace" font-weight="800" font-size="11" fill="white" letter-spacing="2">AI</text>
</svg>
