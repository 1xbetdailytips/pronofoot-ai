<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <defs>
    <radialGradient id="pball" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="30%" stop-color="#e8ecf0"/>
      <stop offset="65%" stop-color="#8896a5"/>
      <stop offset="100%" stop-color="#2d3a4a"/>
    </radialGradient>
    <linearGradient id="pgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="pgreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="psh" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <filter id="pgl">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="200" cy="340" rx="85" ry="12" fill="#1e293b" opacity="0.1"/>

  <!-- Outer ring — gold accent ring around the ball -->
  <circle cx="200" cy="185" r="138" fill="none" stroke="url(#pgold)" stroke-width="2" opacity="0.4"/>
  <circle cx="200" cy="185" r="142" fill="none" stroke="url(#pgold)" stroke-width="0.5" opacity="0.2"/>

  <!-- Main ball -->
  <circle cx="200" cy="185" r="128" fill="url(#pball)" filter="url(#psh)"/>

  <!-- Dark emerald panels (instead of pure black — matches brand) -->
  <path d="M200 70 L226 92 L219 123 L181 123 L174 92 Z" fill="#065f46" opacity="0.82"/>
  <path d="M275 118 L296 148 L285 180 L254 175 L250 142 Z" fill="#065f46" opacity="0.72"/>
  <path d="M125 118 L150 142 L146 175 L115 180 L104 148 Z" fill="#065f46" opacity="0.74"/>
  <path d="M262 215 L284 224 L280 254 L254 264 L240 244 Z" fill="#065f46" opacity="0.6"/>
  <path d="M138 215 L160 244 L146 264 L120 254 L116 224 Z" fill="#065f46" opacity="0.62"/>
  <path d="M177 264 L223 264 L230 286 L200 298 L170 286 Z" fill="#065f46" opacity="0.5"/>

  <!-- Gold-tinted seam lines -->
  <g filter="url(#pgl)">
    <path d="M200 70 L226 92 L219 123 L181 123 L174 92 Z" fill="none" stroke="url(#pgold)" stroke-width="1.5" opacity="0.5"/>
    <path d="M275 118 L296 148 L285 180 L254 175 L250 142 Z" fill="none" stroke="url(#pgold)" stroke-width="1.3" opacity="0.4"/>
    <path d="M125 118 L150 142 L146 175 L115 180 L104 148 Z" fill="none" stroke="url(#pgold)" stroke-width="1.3" opacity="0.4"/>
    <line x1="226" y1="92" x2="250" y2="142" stroke="url(#pgold)" stroke-width="1.2" opacity="0.4"/>
    <line x1="174" y1="92" x2="150" y2="142" stroke="url(#pgold)" stroke-width="1.2" opacity="0.4"/>
    <line x1="219" y1="123" x2="254" y2="175" stroke="url(#pgold)" stroke-width="1" opacity="0.35"/>
    <line x1="181" y1="123" x2="146" y2="175" stroke="url(#pgold)" stroke-width="1" opacity="0.35"/>
    <line x1="285" y1="180" x2="262" y2="215" stroke="url(#pgold)" stroke-width="1" opacity="0.3"/>
    <line x1="115" y1="180" x2="138" y2="215" stroke="url(#pgold)" stroke-width="1" opacity="0.3"/>
    <line x1="254" y1="175" x2="240" y2="244" stroke="url(#pgold)" stroke-width="1" opacity="0.28"/>
    <line x1="146" y1="175" x2="160" y2="244" stroke="url(#pgold)" stroke-width="1" opacity="0.28"/>
  </g>

  <!-- Green circuit traces on ONE panel (subtle AI touch) -->
  <g opacity="0.6">
    <line x1="190" y1="83" x2="210" y2="83" stroke="#34d399" stroke-width="1"/>
    <line x1="200" y1="78" x2="200" y2="92" stroke="#34d399" stroke-width="1"/>
    <circle cx="200" cy="97" r="2.5" fill="#34d399"/>
    <line x1="200" y1="97" x2="200" y2="110" stroke="#34d399" stroke-width="1"/>
    <circle cx="192" cy="110" r="1.5" fill="#34d399" opacity="0.6"/>
    <circle cx="208" cy="110" r="1.5" fill="#34d399" opacity="0.6"/>
    <line x1="192" y1="110" x2="208" y2="110" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Specular highlight -->
  <ellipse cx="165" cy="125" rx="35" ry="22" transform="rotate(-28 165 125)" fill="white" opacity="0.28"/>
  <ellipse cx="158" cy="115" rx="16" ry="10" transform="rotate(-28 158 115)" fill="white" opacity="0.16"/>

  <!-- Wordmark — two-tone with gold accent -->
  <text x="200" y="382" text-anchor="middle" font-family="Inter, 'Helvetica Neue', sans-serif" font-weight="800" font-size="34" letter-spacing="1.5">
    <tspan fill="#1e293b">PRONO</tspan><tspan fill="#059669">FOOT</tspan>
  </text>
  <!-- AI in gold pill -->
  <rect x="176" y="392" width="48" height="22" rx="11" fill="url(#pgold)"/>
  <text x="200" y="408" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="12" fill="white" letter-spacing="3">AI</text>
</svg>
