  <path d="M422 90 L422 130 M422 90 L382 90" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M90 370 L90 330 M90 370 L130 370" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M422 370 L422 330 M422 370 L382 370" stroke="#34d399" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
