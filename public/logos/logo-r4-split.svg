<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <defs>
    <radialGradient id="sball" cx="38%" cy="30%" r="58%">
      <stop offset="0%" stop-color="#fefefe"/>
      <stop offset="25%" stop-color="#f1f5f9"/>
      <stop offset="55%" stop-color="#94a3b8"/>
      <stop offset="85%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </radialGradient>
    <linearGradient id="sgreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="sgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="sdata" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="40%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="ssh" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
    <clipPath id="leftClip"><rect x="0" y="0" width="200" height="420"/></clipPath>
    <clipPath id="rightClip"><rect x="200" y="0" width="200" height="420"/></clipPath>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="200" cy="338" rx="82" ry="11" fill="#1e293b" opacity="0.1"/>

  <!-- Main ball -->
  <circle cx="200" cy="185" r="125" fill="url(#sball)" filter="url(#ssh)"/>

  <!-- LEFT HALF: Classic football look -->
  <g clip-path="url(#leftClip)">
    <!-- Dark panels -->
    <path d="M200 73 L224 94 L218 124 L182 124 L176 94 Z" fill="#1e293b" opacity="0.82"/>
    <path d="M126 120 L150 144 L146 176 L116 181 L106 150 Z" fill="#1e293b" opacity="0.75"/>
    <path d="M140 218 L160 246 L148 266 L122 256 L118 228 Z" fill="#1e293b" opacity="0.62"/>
    <!-- White seam lines -->
    <line x1="176" y1="94" x2="150" y2="144" stroke="white" stroke-width="1.2" opacity="0.3"/>
    <line x1="182" y1="124" x2="146" y2="176" stroke="white" stroke-width="1" opacity="0.25"/>
    <line x1="116" y1="181" x2="140" y2="218" stroke="white" stroke-width="1" opacity="0.22"/>
    <line x1="146" y1="176" x2="160" y2="246" stroke="white" stroke-width="1" opacity="0.2"/>
    <path d="M200 73 L224 94 L218 124 L182 124 L176 94 Z" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
    <path d="M126 120 L150 144 L146 176 L116 181 L106 150 Z" fill="none" stroke="white" stroke-width="1" opacity="0.22"/>
  </g>

  <!-- RIGHT HALF: AI data visualization -->
  <g clip-path="url(#rightClip)">
    <!-- Dark panels with emerald tint -->
    <path d="M200 73 L224 94 L218 124 L182 124 L176 94 Z" fill="#065f46" opacity="0.82"/>
    <path d="M274 120 L294 150 L284 181 L254 176 L250 144 Z" fill="#065f46" opacity="0.72"/>
    <path d="M260 218 L282 228 L278 256 L252 266 L240 246 Z" fill="#065f46" opacity="0.58"/>
    <!-- Glowing seam lines -->
    <line x1="224" y1="94" x2="250" y2="144" stroke="url(#sdata)" stroke-width="1.8" opacity="0.7"/>
    <line x1="218" y1="124" x2="254" y2="176" stroke="url(#sdata)" stroke-width="1.5" opacity="0.6"/>
    <line x1="284" y1="181" x2="260" y2="218" stroke="url(#sdata)" stroke-width="1.3" opacity="0.5"/>
    <line x1="254" y1="176" x2="240" y2="246" stroke="url(#sdata)" stroke-width="1.2" opacity="0.45"/>
    <path d="M274 120 L294 150 L284 181 L254 176 L250 144 Z" fill="none" stroke="url(#sdata)" stroke-width="1.5" opacity="0.5"/>
    <!-- Circuit traces on right panels -->
    <line x1="260" y1="135" x2="280" y2="135" stroke="#34d399" stroke-width="1" opacity="0.5"/>
    <circle cx="280" cy="135" r="2" fill="#34d399" opacity="0.6"/>
    <line x1="280" y1="135" x2="280" y2="155" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <line x1="265" y1="160" x2="275" y2="160" stroke="#34d399" stroke-width="1" opacity="0.4"/>
    <circle cx="265" cy="160" r="1.5" fill="#f59e0b" opacity="0.5"/>
    <circle cx="270" cy="145" r="1.5" fill="#10b981" opacity="0.5"/>
    <!-- Data dots -->
    <circle cx="310" cy="160" r="2.5" fill="#10b981" opacity="0.4"/>
    <circle cx="300" cy="200" r="2" fill="#f59e0b" opacity="0.35"/>
    <circle cx="315" cy="130" r="1.5" fill="#34d399" opacity="0.3"/>
  </g>

  <!-- Center dividing line — subtle split effect -->
  <line x1="200" y1="62" x2="200" y2="308" stroke="white" stroke-width="1.5" opacity="0.2"/>

  <!-- Specular highlight (crosses both halves naturally) -->
  <ellipse cx="168" cy="125" rx="38" ry="22" transform="rotate(-28 168 125)" fill="white" opacity="0.25"/>
  <ellipse cx="160" cy="115" rx="16" ry="9" transform="rotate(-28 160 115)" fill="white" opacity="0.14"/>

  <!-- Labels on each half -->
  <text x="145" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="8" fill="#64748b" letter-spacing="2" opacity="0.5">FOOTBALL</text>
  <text x="255" y="310" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="8" fill="#10b981" letter-spacing="2" opacity="0.5">AI</text>

  <!-- Wordmark -->
  <text x="200" y="380" text-anchor="middle" font-family="Inter, 'Helvetica Neue', sans-serif" font-weight="800" font-size="34" letter-spacing="1.5">
    <tspan fill="#1e293b">PRONO</tspan><tspan fill="#059669">FOOT</tspan>
  </text>
  <!-- Dual-color underline -->
  <line x1="110" y1="390" x2="200" y2="390" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="390" x2="290" y2="390" stroke="#059669" stroke-width="2" stroke-linecap="round"/>
  <text x="200" y="410" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="#94a3b8" letter-spacing="4">AI PREDICTIONS</text>
</svg>
